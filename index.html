<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResearchReach — Professor Outreach Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.6;
    transition: background 0.18s, color 0.18s;
    overflow: hidden;
  }

  /* ── TOKENS ── */
  :root {
    --bg:          #FAFAF8;
    --bg-2:        #F3F3F0;
    --bg-3:        #EEECEA;
    --surface:     #FFFFFF;
    --border:      #E8E7E3;
    --border-2:    #D5D3CE;
    --ink:         #1C1C1E;
    --ink-2:       #4A4A4F;
    --ink-3:       #8A8A90;
    --accent:      #7C6FF7;
    --accent-soft: #EEF0FF;
    --amber:       #F59E0B;
    --amber-soft:  #FFFBEB;
    --green:       #10B981;
    --green-soft:  #ECFDF5;
    --red:         #EF4444;
    --red-soft:    #FEF2F2;
    --sidebar-w:   260px;
    --topbar-h:    52px;
  }
  [data-theme="dark"] {
    --bg:          #141414;
    --bg-2:        #1C1C1E;
    --bg-3:        #242426;
    --surface:     #1C1C1E;
    --border:      #2C2C2E;
    --border-2:    #3A3A3C;
    --ink:         #F2F2F7;
    --ink-2:       #AEAEB2;
    --ink-3:       #636366;
    --accent:      #9D96FA;
    --accent-soft: #1E1B3A;
    --amber:       #FBBF24;
    --amber-soft:  #1C1500;
    --green:       #34D399;
    --green-soft:  #022C22;
    --red:         #F87171;
    --red-soft:    #2C0A0A;
  }

  /* ── APP SHELL ── */
  .app { display: flex; flex-direction: column; height: 100vh; }

  /* TOPBAR */
  .topbar {
    height: var(--topbar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.25rem;
    flex-shrink: 0;
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .logo-text { font-family: 'Lora', Georgia, serif; font-weight: 500; font-size: 16px; color: var(--ink); letter-spacing: -0.01em; }
  .logo-sep { color: var(--border-2); margin: 0 6px; }
  .logo-sub { font-size: 12px; color: var(--ink-3); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .theme-toggle { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg-2); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; transition: all 0.15s; color: var(--ink-2); }
  .theme-toggle:hover { border-color: var(--accent); }

  /* BODY SPLIT */
  .body-split {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* LEFT SIDEBAR — steps nav */
  .sidebar {
    width: var(--sidebar-w);
    flex-shrink: 0;
    background: var(--bg-2);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 1.25rem 0.75rem;
    gap: 4px;
  }
  .sidebar-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--ink-3); padding: 0 8px; margin: 8px 0 4px; }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 10px;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.15s;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    color: var(--ink-2);
    width: 100%;
    text-align: left;
  }
  .nav-item:hover { background: var(--bg-3); color: var(--ink); }
  .nav-item.active { background: var(--accent-soft); color: var(--accent); font-weight: 500; }
  .nav-item.done { color: var(--green); }
  .nav-dot {
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px;
    font-weight: 600;
    flex-shrink: 0;
  }
  .nav-dot.filled { background: currentColor; }
  .nav-dot.filled span { color: var(--bg-2); }
  .nav-divider { height: 1px; background: var(--border); margin: 8px 0; }

  /* MAIN PANEL */
  .main {
    flex: 1;
    overflow-y: auto;
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* PANELS */
  .panel { display: none; flex-direction: column; gap: 12px; height: 100%; }
  .panel.active { display: flex; }

  /* CARDS */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem 1.5rem;
    transition: border-color 0.15s;
  }
  .card-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 14px;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 1rem;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title-icon { font-size: 14px; }

  /* INPUTS */
  input[type="text"], textarea, select {
    padding: 9px 12px;
    border: 1px solid var(--border);
    border-radius: 7px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
    width: 100%;
    background: var(--bg-2);
    color: var(--ink);
    transition: all 0.15s;
    outline: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
    background: var(--surface);
    box-shadow: 0 0 0 3px rgba(124,111,247,0.1);
  }
  textarea { resize: vertical; min-height: 220px; line-height: 1.7; }
  .input-row { display: flex; gap: 8px; }
  .input-row input { flex: 1; }

  /* BUTTONS */
  .btn { padding: 8px 15px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.15s; border: none; display: inline-flex; align-items: center; gap: 5px; white-space: nowrap; }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover:not(:disabled) { opacity: 0.82; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-accent:disabled { opacity: 0.35; cursor: not-allowed; }
  .btn-ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg-2); color: var(--ink); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid transparent; font-size: 12px; padding: 5px 9px; }
  .btn-danger:hover { background: var(--red-soft); border-color: var(--red); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1rem; }

  /* FIELD */
  .field { margin-bottom: 10px; }
  .field label { font-size: 11px; font-weight: 600; color: var(--ink-3); display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.05em; }

  /* HINT / STATUS */
  .hint { font-size: 12px; color: var(--ink-3); margin-top: 5px; }
  .status { font-size: 13px; color: var(--ink-3); margin-top: 8px; min-height: 18px; }
  .status.err { color: var(--red); }

  /* PUB CARDS */
  .pub-list { display: flex; flex-direction: column; gap: 8px; margin-top: 1rem; }
  .pub-card { background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px; padding: 1rem 1.1rem; border-left: 3px solid var(--border-2); transition: all 0.15s; }
  .pub-card:hover { border-color: var(--accent); border-left-color: var(--accent); }
  .pub-card.selected { border-left-color: var(--green); border-color: var(--green); background: var(--green-soft); }
  .pub-card-title { font-family: 'Lora', Georgia, serif; font-size: 14px; font-weight: 500; line-height: 1.45; margin-bottom: 5px; color: var(--ink); }
  .pub-card-title a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--border-2); }
  .pub-card-title a:hover { color: var(--accent); border-bottom-color: var(--accent); }
  .pub-card-meta { font-size: 11px; color: var(--ink-3); margin-bottom: 4px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
  .pub-card-authors { font-size: 12px; color: var(--ink-2); margin-bottom: 7px; font-style: italic; line-height: 1.5; }
  .pub-card-abstract { font-size: 12.5px; color: var(--ink-2); line-height: 1.65; }
  .pub-card-footer { margin-top: 10px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }

  /* SELECTED PAPER PREVIEW (top of step 2) */
  .paper-preview {
    background: var(--accent-soft);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 4px;
  }
  .paper-preview-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--accent); margin-bottom: 6px; }
  .paper-preview-title { font-family: 'Lora', Georgia, serif; font-size: 14px; font-weight: 500; color: var(--ink); line-height: 1.45; margin-bottom: 5px; }
  .paper-preview-title a { color: inherit; text-decoration: none; border-bottom: 1px solid rgba(124,111,247,0.4); }
  .paper-preview-title a:hover { color: var(--accent); }
  .paper-preview-meta { font-size: 12px; color: var(--ink-2); margin-bottom: 5px; }
  .paper-preview-authors { font-size: 12px; color: var(--ink-2); font-style: italic; margin-bottom: 8px; line-height: 1.5; }
  .paper-preview-abstract { font-size: 12.5px; color: var(--ink-2); line-height: 1.65; }

  /* SUMMARY BOX */
  .summary-box { background: var(--bg-2); border-radius: 10px; padding: 1rem 1.2rem; font-size: 13.5px; line-height: 1.8; color: var(--ink-2); border-left: 3px solid var(--accent); }
  .summary-box p { margin-bottom: 0.65rem; }
  .summary-box p:last-child { margin-bottom: 0; }

  /* BADGES */
  .badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 100px; letter-spacing: 0.03em; text-transform: uppercase; }
  .badge-purple  { background: var(--accent-soft); color: var(--accent); }
  .badge-high    { background: var(--red-soft); color: var(--red); }
  .badge-medium  { background: var(--amber-soft); color: var(--amber); }
  .badge-low     { background: var(--green-soft); color: var(--green); }

  /* DIVIDER */
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }

  /* TRACKER */
  .tracker-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.25rem; }
  .tracker-title { font-family: 'Lora', Georgia, serif; font-size: 15px; font-weight: 500; }
  .tracker-count { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .tracker-empty { text-align: center; padding: 3rem 1rem; color: var(--ink-3); font-size: 13px; line-height: 1.8; }
  .tracker-empty strong { display: block; font-size: 15px; color: var(--ink-2); margin-bottom: 8px; }
  .tracker-table { width: 100%; border-collapse: collapse; }
  .tracker-table th { text-align: left; padding: 8px 12px; font-size: 10px; text-transform: uppercase; letter-spacing: 0.07em; color: var(--ink-3); font-weight: 600; border-bottom: 1px solid var(--border); }
  .tracker-table td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: middle; font-size: 13px; }
  .tracker-table tr:last-child td { border-bottom: none; }
  .tracker-table tbody tr:hover td { background: var(--bg-2); }
  .prof-name { font-weight: 500; font-size: 13px; }
  .prof-email-small { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
  .paper-link { font-size: 11px; color: var(--accent); text-decoration: none; }
  .paper-link:hover { text-decoration: underline; }
  .followup-ok { color: var(--green); font-size: 12px; }
  .followup-soon { color: var(--amber); font-weight: 500; font-size: 12px; }
  .followup-overdue { color: var(--red); font-weight: 500; font-size: 12px; }
  .notes-input { border: 1px solid var(--border); border-radius: 6px; padding: 5px 9px; font-size: 12px; width: 100%; min-width: 120px; background: var(--bg-2); color: var(--ink); font-family: 'Inter', sans-serif; outline: none; }
  .notes-input:focus { border-color: var(--accent); }

  /* SPINNER / TOAST */
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -2px; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 1.5rem; right: 1.5rem; background: var(--ink); color: var(--bg); padding: 10px 16px; border-radius: 10px; font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(6px); transition: all 0.2s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* RESPONSIVE */
  @media (max-width: 680px) {
    body { overflow: auto; }
    .body-split { flex-direction: column; overflow: visible; }
    .sidebar { width: 100%; flex-direction: row; overflow-x: auto; padding: 0.5rem; gap: 4px; border-right: none; border-bottom: 1px solid var(--border); }
    .sidebar-section, .nav-divider { display: none; }
    .nav-item { white-space: nowrap; }
    .main { overflow: visible; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div class="logo-text">ResearchReach</div>
      <span class="logo-sep">·</span>
      <div class="logo-sub">Volunteer outreach tool</div>
    </div>
    <div class="topbar-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">🌙</button>
    </div>
  </div>

  <div class="body-split">

    <!-- SIDEBAR -->
    <div class="sidebar">
      <div class="sidebar-section">Workflow</div>

      <button class="nav-item active" id="nav-search" onclick="showPanel('search')">
        <div class="nav-dot"><span>1</span></div>
        Search Publications
      </button>
      <button class="nav-item" id="nav-summary" onclick="showPanel('summary')">
        <div class="nav-dot"><span>2</span></div>
        Research Summary
      </button>
      <button class="nav-item" id="nav-email" onclick="showPanel('email')">
        <div class="nav-dot"><span>3</span></div>
        Compose Email
      </button>

      <div class="nav-divider"></div>
      <div class="sidebar-section">Tracking</div>

      <button class="nav-item" id="nav-tracker" onclick="showPanel('tracker')">
        <div class="nav-dot"><span>📋</span></div>
        Email Tracker
      </button>
    </div>

    <!-- MAIN CONTENT -->
    <div class="main">

      <!-- PANEL: SEARCH -->
      <div class="panel active" id="panel-search">
        <div class="card">
          <div class="card-title"><span class="card-title-icon">🔍</span> Find a professor's publications</div>
          <div class="input-row">
            <input type="text" id="profName" placeholder="e.g. Jennifer Doudna UC Berkeley" onkeydown="if(event.key==='Enter') searchPubs()" />
            <button class="btn btn-primary" id="searchBtn" onclick="searchPubs()">Search</button>
          </div>
          <div class="hint">Include university for best results — e.g. "David Baker University of Washington"</div>
          <div id="searchStatus" class="status"></div>
          <div class="pub-list" id="pubResults"></div>
        </div>
      </div>

      <!-- PANEL: SUMMARY -->
      <div class="panel" id="panel-summary">
        <!-- Selected paper preview — filled dynamically -->
        <div id="paperPreview" class="paper-preview" style="display:none;"></div>

        <div class="card">
          <div class="card-title"><span class="card-title-icon">📄</span> Research summary</div>
          <div id="summaryBox" class="summary-box" style="color:var(--ink-3); font-style:italic;">Select a paper in Step 1 first.</div>
        </div>

        <div style="display:flex; justify-content:flex-end;">
          <button class="btn btn-accent" onclick="showPanel('email')" id="toEmailBtn">Continue to email →</button>
        </div>
      </div>

      <!-- PANEL: EMAIL -->
      <div class="panel" id="panel-email">
        <!-- Selected paper preview — filled dynamically -->
        <div id="paperPreviewEmail" class="paper-preview" style="display:none;"></div>

        <div class="card">
          <div class="card-title"><span class="card-title-icon">✉️</span> Compose your email</div>
          <div class="field">
            <label>Your full name</label>
            <input type="text" id="senderName" placeholder="e.g. Alex Varela" />
          </div>
          <div class="field">
            <label>Your degree &amp; university</label>
            <input type="text" id="senderInfo" value="B.S. Biochemistry, California State University Fullerton" />
          </div>
          <div class="field">
            <label>Professor's email <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
            <input type="text" id="profEmail" placeholder="professor@university.edu" />
          </div>
          <button class="btn btn-accent" onclick="generateEmail()" id="genEmailBtn">Generate email draft</button>
          <div id="emailStatus" class="status"></div>

          <div id="emailArea" style="display:none; margin-top:1.1rem;">
            <div class="divider"></div>
            <div class="field">
              <label>Subject line</label>
              <input type="text" id="emailSubject" />
            </div>
            <div class="field">
              <label>Email body — edit freely</label>
              <textarea id="emailBody"></textarea>
            </div>
            <div class="action-row">
              <button class="btn btn-primary" onclick="openGmail()">Open in Gmail</button>
              <button class="btn btn-ghost" onclick="copyEmail()">Copy email</button>
              <button class="btn btn-ghost" onclick="generateEmail()">Regenerate</button>
              <button class="btn btn-ghost" onclick="logToTracker()">Mark as sent</button>
            </div>
          </div>
        </div>
      </div>

      <!-- PANEL: TRACKER -->
      <div class="panel" id="panel-tracker">
        <div class="card">
          <div class="tracker-topbar">
            <div>
              <div class="tracker-title">Outreach Log</div>
              <div class="tracker-count" id="trackerCount">No entries yet</div>
            </div>
            <button class="btn btn-ghost btn-sm" onclick="clearAllTracked()">Clear all</button>
          </div>
          <div id="trackerBody"></div>
        </div>
      </div>

    </div><!-- /main -->
  </div><!-- /body-split -->
</div><!-- /app -->

<div class="toast" id="toast"></div>

<script>
  // ─────────────────────────────────────────────────────────────
  //  PASTE YOUR CLOUDFLARE WORKER URL BELOW (keep the quotes)
  // ─────────────────────────────────────────────────────────────
  const WORKER_URL = "https://professor-emailer.avarela8058.workers.dev/";

  let selectedPub = null;
  let profNameValue = '';

  // ── THEME ────────────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const dark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', dark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = dark ? '🌙' : '☀️';
    localStorage.setItem('theme', dark ? 'light' : 'dark');
  }
  (function() {
    const s = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', s);
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('themeBtn').textContent = s === 'dark' ? '☀️' : '🌙';
    });
  })();

  // ── PANEL NAV ─────────────────────────────────────────────────
  function showPanel(name) {
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById('panel-' + name).classList.add('active');
    document.getElementById('nav-' + name).classList.add('active');
    if (name === 'tracker') renderTracker();
  }

  // ── CLAUDE API ────────────────────────────────────────────────
  async function callClaude(userPrompt, system) {
    if (WORKER_URL === "PASTE_YOUR_WORKER_URL_HERE") {
      throw new Error("Worker URL not set — replace PASTE_YOUR_WORKER_URL_HERE in index.html with your Cloudflare Worker URL.");
    }
    const body = { model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: userPrompt }] };
    if (system) body.system = system;
    const res = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err?.error?.message || 'API error ' + res.status);
    }
    const data = await res.json();
    return data.content?.find(b => b.type === 'text')?.text || '';
  }

  // ── PAPER PREVIEW ─────────────────────────────────────────────
  function renderPaperPreview(pub, containerId) {
    const el = document.getElementById(containerId);
    if (!pub) { el.style.display = 'none'; return; }
    const authorsDisplay = pub.authors.length
      ? pub.authors.slice(0, 6).join(', ') + (pub.authors.length > 6 ? ', et al.' : '')
      : 'Authors unavailable';
    const titleHtml = pub.pubmedUrl
      ? `<a href="${pub.pubmedUrl}" target="_blank">${pub.title}</a>`
      : pub.title;
    const currentYear = new Date().getFullYear();
    const age = currentYear - (parseInt(pub.year) || 0);
    let pLabel = 'High Priority', pClass = 'badge-high';
    if (age >= 3) { pLabel = 'Low Priority'; pClass = 'badge-low'; }
    else if (age >= 1) { pLabel = 'Medium Priority'; pClass = 'badge-medium'; }

    el.innerHTML = `
      <div class="paper-preview-label">Selected paper</div>
      <div class="paper-preview-title">${titleHtml}</div>
      <div class="paper-preview-meta">
        ${pub.journal} · ${pub.year}
        ${pub.pmid ? `&nbsp;<span class="badge badge-purple">PMID ${pub.pmid}</span>` : ''}
        &nbsp;<span class="badge ${pClass}">${pLabel}</span>
      </div>
      <div class="paper-preview-authors">Authors: ${authorsDisplay}</div>
      <div class="paper-preview-abstract">${pub.abstract.length > 400 ? pub.abstract.slice(0,400)+'…' : pub.abstract}</div>
    `;
    el.style.display = 'block';
  }

  // ── PUBMED SEARCH ─────────────────────────────────────────────
  async function searchPubs() {
    const name = document.getElementById('profName').value.trim();
    if (!name) return;
    profNameValue = name;
    const status = document.getElementById('searchStatus');
    const results = document.getElementById('pubResults');
    const btn = document.getElementById('searchBtn');
    status.className = 'status';
    status.innerHTML = '<span class="spinner"></span> Searching PubMed…';
    results.innerHTML = '';
    btn.disabled = true;
    selectedPub = null;
    renderPaperPreview(null, 'paperPreview');
    renderPaperPreview(null, 'paperPreviewEmail');

    try {
      const query = encodeURIComponent(name + '[Author]');
      const s1 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${query}&retmax=5&sort=date&retmode=json`);
      const d1 = await s1.json();
      let ids = d1.esearchresult?.idlist || [];
      if (!ids.length) {
        const s2 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(name)}&retmax=5&sort=date&retmode=json`);
        const d2 = await s2.json();
        ids = d2.esearchresult?.idlist || [];
      }
      if (!ids.length) {
        status.className = 'status err';
        status.innerHTML = `No results for "${name}". Try last name + initials (e.g. "Doudna JA") or add their university.`;
        btn.disabled = false; return;
      }
      const fr = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.slice(0,5).join(',')}&retmode=xml`);
      const xml = await fr.text();
      const doc = new DOMParser().parseFromString(xml, 'text/xml');
      const articles = Array.from(doc.querySelectorAll('PubmedArticle'));
      if (!articles.length) {
        status.className = 'status err';
        status.innerHTML = 'Could not parse results. Try a different name format.';
        btn.disabled = false; return;
      }
      const pubs = articles.map(art => {
        const authors = Array.from(art.querySelectorAll('Author')).map(a => {
          const last = a.querySelector('LastName')?.textContent || '';
          const ini = a.querySelector('Initials')?.textContent || '';
          return `${last} ${ini}`.trim();
        }).filter(Boolean);
        const pmid = art.querySelector('PMID')?.textContent || '';
        return {
          pmid,
          title: art.querySelector('ArticleTitle')?.textContent || 'Untitled',
          journal: art.querySelector('Journal > Title')?.textContent || '',
          year: art.querySelector('PubDate > Year')?.textContent || art.querySelector('PubDate > MedlineDate')?.textContent?.slice(0,4) || '',
          authors,
          abstract: Array.from(art.querySelectorAll('AbstractText')).map(a => a.textContent).join(' ') || 'No abstract available.',
          pubmedUrl: pmid ? `https://pubmed.ncbi.nlm.nih.gov/${pmid}/` : ''
        };
      });
      window._pubs = pubs;
      status.innerHTML = `Found ${pubs.length} publication${pubs.length !== 1 ? 's' : ''} — select one to continue.`;
      pubs.forEach((pub, i) => {
        const card = document.createElement('div');
        card.className = 'pub-card';
        card.id = 'pub-' + i;
        const shortAbs = pub.abstract.length > 300 ? pub.abstract.slice(0,300)+'…' : pub.abstract;
        const authorsDisplay = pub.authors.length ? pub.authors.slice(0,6).join(', ') + (pub.authors.length > 6 ? ', et al.' : '') : 'Authors unavailable';
        const titleHtml = pub.pubmedUrl ? `<a href="${pub.pubmedUrl}" target="_blank">${pub.title}</a>` : pub.title;
        const age = new Date().getFullYear() - (parseInt(pub.year) || 0);
        let pLabel = 'High', pClass = 'badge-high';
        if (age >= 3) { pLabel = 'Low'; pClass = 'badge-low'; }
        else if (age >= 1) { pLabel = 'Medium'; pClass = 'badge-medium'; }
        card.innerHTML = `
          <div class="pub-card-title">${titleHtml}</div>
          <div class="pub-card-meta">
            <span>${pub.journal}</span><span style="color:var(--border-2)">·</span><span>${pub.year}</span>
            ${pub.pmid ? `<span class="badge badge-purple">PMID ${pub.pmid}</span>` : ''}
            <span class="badge ${pClass}">${pLabel} Priority</span>
          </div>
          <div class="pub-card-authors">Authors: ${authorsDisplay}</div>
          <div class="pub-card-abstract">${shortAbs}</div>
          <div class="pub-card-footer">
            ${pub.pubmedUrl ? `<a href="${pub.pubmedUrl}" target="_blank" style="font-size:12px;color:var(--accent);text-decoration:none;">View on PubMed ↗</a>` : '<span></span>'}
            <button class="btn btn-primary btn-sm" onclick="selectPub(${i})">Use this paper</button>
          </div>`;
        results.appendChild(card);
      });
    } catch(e) {
      status.className = 'status err';
      status.innerHTML = 'PubMed error: ' + e.message;
    }
    btn.disabled = false;
  }

  // ── SELECT & SUMMARIZE ────────────────────────────────────────
  async function selectPub(idx) {
    const pub = window._pubs[idx];
    document.querySelectorAll('.pub-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('pub-' + idx).classList.add('selected');
    selectedPub = pub;

    // Render paper preview on both panels
    renderPaperPreview(pub, 'paperPreview');
    renderPaperPreview(pub, 'paperPreviewEmail');

    // Switch to summary panel
    showPanel('summary');

    // Update nav dot for step 1 to show done
    document.getElementById('nav-search').classList.remove('active');
    document.getElementById('nav-summary').classList.add('active');

    const summaryBox = document.getElementById('summaryBox');
    summaryBox.innerHTML = '<span class="spinner"></span> Summarizing with Claude AI…';
    summaryBox.style.fontStyle = 'normal';
    summaryBox.style.color = 'var(--ink-2)';

    try {
      const text = await callClaude(
        `Summarize this research paper for a biochemistry undergraduate who wants to volunteer in this professor's lab.\n\nTitle: ${pub.title}\nJournal: ${pub.journal} (${pub.year})\nAuthors: ${pub.authors.join(', ')}\nAbstract: ${pub.abstract}\n\nWrite 3 focused paragraphs (~60 words each):\n1. What the research is about and why it matters\n2. Key methods and main findings\n3. What skills a volunteer biochemistry student could gain\n\nTone: enthusiastic but grounded. Plain language, no bullet points.`,
        'You are a science communicator helping undergraduates understand research.'
      );
      summaryBox.innerHTML = text.trim().split(/\n\n+/).filter(Boolean).map(p => `<p>${p.trim()}</p>`).join('');
    } catch(e) {
      summaryBox.innerHTML = `<span style="color:var(--red)">Error: ${e.message}</span>`;
    }
  }

  // ── GENERATE EMAIL ────────────────────────────────────────────
  async function generateEmail() {
    if (!selectedPub) { showToast('Select a paper first — go to Step 1'); return; }
    const sender = document.getElementById('senderName').value.trim() || '[Your Name]';
    const senderInfo = document.getElementById('senderInfo').value.trim();
    const btn = document.getElementById('genEmailBtn');
    const status = document.getElementById('emailStatus');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Drafting…';
    status.innerHTML = '';
    try {
      const text = await callClaude(
        `Write a cold email from ${sender} (${senderInfo}) to Professor ${profNameValue} requesting an unpaid volunteer research position.\n\nPaper: "${selectedPub.title}" — ${selectedPub.journal} (${selectedPub.year})\nAbstract: ${selectedPub.abstract}\n\nFormat:\nSubject: [subject line]\n\n[body]\n\nGuidelines:\n- Open with one specific compelling detail from this paper\n- Show genuine curiosity about this research direction\n- Mention biochemistry background at CSUF\n- Clearly state this is an unpaid volunteer request\n- 3-4 short paragraphs, warm but professional\n- Close with a request for a 15-minute call\n- Sign off as: ${sender}\n- No placeholder brackets anywhere`,
        'You write cold emails that sound like a real enthusiastic college student wrote them — not a professional copywriter or AI. Use natural sentence rhythm with occasional short sentences. Vary paragraph length. Avoid corporate phrases like "I am writing to express my interest", "I would be honored", "keen interest", "leverage my skills", "align with my goals", or "I am reaching out". Never use em-dashes. Do not open with the student\'s name or "My name is". Write the way a smart, excited undergrad actually talks — genuine curiosity, a little informal but still respectful, no buzzwords.'
      );
      const lines = text.split('\n');
      const subjIdx = lines.findIndex(l => l.toLowerCase().startsWith('subject:'));
      const subject = subjIdx >= 0 ? lines[subjIdx].replace(/^subject:\s*/i,'').trim() : `Volunteer Research Inquiry — ${profNameValue} Lab`;
      const body = lines.slice(subjIdx+1).join('\n').replace(/^\n+/,'');
      document.getElementById('emailSubject').value = subject;
      document.getElementById('emailBody').value = body;
      document.getElementById('emailArea').style.display = 'block';
      btn.innerHTML = 'Regenerate draft';
    } catch(e) {
      status.className = 'status err';
      status.innerHTML = 'Error: ' + e.message;
      btn.innerHTML = 'Generate email draft';
    }
    btn.disabled = false;
  }

  function openGmail() {
    const to = encodeURIComponent(document.getElementById('profEmail').value.trim());
    const subject = encodeURIComponent(document.getElementById('emailSubject').value);
    const body = encodeURIComponent(document.getElementById('emailBody').value);
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${subject}&body=${body}`, '_blank');
  }
  function copyEmail() {
    const full = `Subject: ${document.getElementById('emailSubject').value}\n\n${document.getElementById('emailBody').value}`;
    navigator.clipboard.writeText(full).then(() => showToast('Email copied to clipboard'));
  }

  // ── TRACKER ───────────────────────────────────────────────────
  function getTracked() { try { return JSON.parse(localStorage.getItem('prof_tracker')||'[]'); } catch { return []; } }
  function saveTracked(d) { localStorage.setItem('prof_tracker', JSON.stringify(d)); }

  function logToTracker() {
    if (!selectedPub || !profNameValue) return;
    const today = new Date();
    const fu = new Date(today); fu.setDate(fu.getDate()+14);
    const age = new Date().getFullYear() - (parseInt(selectedPub.year)||0);
    let priority = age >= 3 ? 'Low' : age >= 1 ? 'Medium' : 'High';
    const tracked = getTracked();
    if (tracked.find(t => t.professor.toLowerCase() === profNameValue.toLowerCase())) {
      showToast('Already in tracker'); return;
    }
    tracked.unshift({
      id: Date.now(), professor: profNameValue,
      email: document.getElementById('profEmail').value.trim(),
      paper: selectedPub.title, paperUrl: selectedPub.pubmedUrl||'',
      dateSent: today.toISOString().split('T')[0],
      followUpDate: fu.toISOString().split('T')[0],
      priority, notes: ''
    });
    saveTracked(tracked);
    showToast('Added to outreach log');
  }

  function renderTracker() {
    const tracked = getTracked();
    document.getElementById('trackerCount').textContent = tracked.length ? `${tracked.length} professor${tracked.length!==1?'s':''} tracked` : 'No entries yet';
    const body = document.getElementById('trackerBody');
    if (!tracked.length) {
      body.innerHTML = `<div class="tracker-empty"><strong>Your outreach log is empty</strong>Search a professor, generate an email, then click <em>"Mark as sent"</em>.</div>`;
      return;
    }
    const today = new Date().toISOString().split('T')[0];
    body.innerHTML = `<table class="tracker-table">
      <thead><tr><th>Professor</th><th>Priority</th><th>Sent</th><th>Follow-up</th><th>Notes</th><th></th></tr></thead>
      <tbody>${tracked.map(t => {
        const pc = t.priority==='High'?'badge-high':t.priority==='Medium'?'badge-medium':'badge-low';
        const days = Math.ceil((new Date(t.followUpDate)-new Date(today))/86400000);
        let fClass='followup-ok', fLabel=t.followUpDate;
        if(days<0){fClass='followup-overdue';fLabel=`Overdue · ${t.followUpDate}`;}
        else if(days<=3){fClass='followup-soon';fLabel=`Due soon · ${t.followUpDate}`;}
        return `<tr>
          <td>
            <div class="prof-name">${t.professor}</div>
            ${t.email?`<div class="prof-email-small">${t.email}</div>`:''}
            ${t.paperUrl?`<a href="${t.paperUrl}" target="_blank" class="paper-link">View paper ↗</a>`:''}
          </td>
          <td><span class="badge ${pc}">${t.priority}</span></td>
          <td style="font-size:12px;color:var(--ink-2);">${t.dateSent}</td>
          <td class="${fClass}">${fLabel}</td>
          <td><input class="notes-input" placeholder="Add notes…" value="${t.notes||''}" onchange="updateNotes(${t.id},this.value)" /></td>
          <td><button class="btn btn-danger" onclick="removeTracked(${t.id})">Remove</button></td>
        </tr>`;
      }).join('')}</tbody></table>`;
  }

  function updateNotes(id,v){const t=getTracked();const e=t.find(x=>x.id===id);if(e){e.notes=v;saveTracked(t);}}
  function removeTracked(id){saveTracked(getTracked().filter(t=>t.id!==id));renderTracker();}
  function clearAllTracked(){if(confirm('Clear all tracked professors?')){saveTracked([]);renderTracker();}}
  function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2500);}
</script>
</body>
