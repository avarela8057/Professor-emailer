<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ResearchReach — Professor Outreach Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:          #FAFAF8;
    --bg-2:        #F3F3F0;
    --bg-3:        #EEECEA;
    --surface:     #FFFFFF;
    --border:      #E8E7E3;
    --border-2:    #D5D3CE;
    --ink:         #1C1C1E;
    --ink-2:       #4A4A4F;
    --ink-3:       #8A8A90;
    --accent:      #7C6FF7;
    --accent-soft: #EEF0FF;
    --amber:       #F59E0B;
    --amber-soft:  #FFFBEB;
    --green:       #10B981;
    --green-soft:  #ECFDF5;
    --red:         #EF4444;
    --red-soft:    #FEF2F2;
    --radius-sm:   6px;
    --radius-md:   10px;
    --radius-lg:   14px;
    --shadow:      0 1px 3px rgba(0,0,0,0.06);
    --transition:  0.18s ease;
    --step-w:      340px;
  }
  [data-theme="dark"] {
    --bg:          #141414;
    --bg-2:        #1C1C1E;
    --bg-3:        #242426;
    --surface:     #1C1C1E;
    --border:      #2C2C2E;
    --border-2:    #3A3A3C;
    --ink:         #F2F2F7;
    --ink-2:       #AEAEB2;
    --ink-3:       #636366;
    --accent:      #9D96FA;
    --accent-soft: #1E1B3A;
    --amber:       #FBBF24;
    --amber-soft:  #1C1500;
    --green:       #34D399;
    --green-soft:  #022C22;
    --red:         #F87171;
    --red-soft:    #2C0A0A;
    --shadow:      0 1px 3px rgba(0,0,0,0.3);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { height: 100%; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--ink);
    height: 100%;
    font-size: 14px;
    line-height: 1.6;
    transition: background var(--transition), color var(--transition);
    overflow: hidden;
  }

  /* ── APP SHELL ────────────────────────────────────────────── */
  .app-shell {
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* ── TOPBAR ───────────────────────────────────────────────── */
  .topbar {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 1.5rem;
    height: 54px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
  }
  .logo { display: flex; align-items: center; gap: 9px; }
  .logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
  .logo-text { font-family: 'Lora', Georgia, serif; font-weight: 500; font-size: 15px; color: var(--ink); letter-spacing: -0.01em; }
  .topbar-center {
    display: flex;
    align-items: center;
    gap: 2px;
    background: var(--bg-2);
    border-radius: var(--radius-md);
    padding: 3px;
  }
  .tab-btn {
    padding: 6px 14px;
    border: none;
    background: transparent;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-3);
    cursor: pointer;
    border-radius: calc(var(--radius-md) - 2px);
    transition: all var(--transition);
    font-family: 'Inter', sans-serif;
    white-space: nowrap;
  }
  .tab-btn.active { background: var(--surface); color: var(--ink); box-shadow: var(--shadow); }
  .tab-btn:hover:not(.active) { color: var(--ink-2); }
  .topbar-right { display: flex; align-items: center; gap: 8px; }
  .icon-btn {
    width: 32px; height: 32px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: transparent;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 14px;
    transition: all var(--transition);
    color: var(--ink-2);
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-soft); }

  /* ── STEP RAIL ────────────────────────────────────────────── */
  .step-rail {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0 1.5rem;
    height: 44px;
    border-bottom: 1px solid var(--border);
    background: var(--bg-2);
    overflow-x: auto;
  }
  .step-rail::-webkit-scrollbar { display: none; }
  .step-pill {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink-3);
    white-space: nowrap;
    cursor: default;
    transition: all var(--transition);
    border: 1px solid transparent;
  }
  .step-pill.active {
    background: var(--surface);
    color: var(--accent);
    border-color: var(--accent);
    box-shadow: var(--shadow);
  }
  .step-pill.done {
    color: var(--green);
  }
  .step-num {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--bg-3);
    color: var(--ink-3);
    font-size: 10px;
    font-weight: 600;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all var(--transition);
  }
  .step-pill.active .step-num { background: var(--accent-soft); color: var(--accent); }
  .step-pill.done .step-num { background: var(--green-soft); color: var(--green); }
  .step-arrow { color: var(--border-2); margin: 0 4px; font-size: 12px; flex-shrink: 0; }

  /* ── CONTENT AREA ─────────────────────────────────────────── */
  .content-area {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .tab-panel { display: none; flex: 1; overflow: hidden; }
  .tab-panel.active { display: flex; flex-direction: column; }

  /* ── HORIZONTAL STEPS ─────────────────────────────────────── */
  .steps-row {
    display: flex;
    flex: 1;
    overflow: hidden;
    gap: 0;
  }
  .step-col {
    display: flex;
    flex-direction: column;
    flex: 1;
    min-width: 0;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .step-col:last-child { border-right: none; }
  .step-col-header {
    flex-shrink: 0;
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }
  .step-col-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-2);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .step-col-body {
    flex: 1;
    overflow-y: auto;
    padding: 1rem 1.25rem;
    background: var(--bg);
  }
  .step-col-body::-webkit-scrollbar { width: 4px; }
  .step-col-body::-webkit-scrollbar-track { background: transparent; }
  .step-col-body::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }

  /* ── INPUTS ───────────────────────────────────────────────── */
  .input-row { display: flex; gap: 8px; align-items: stretch; }
  .input-row input { flex: 1; }
  input[type="text"], input[type="date"], textarea, select {
    padding: 8px 11px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-family: 'Inter', sans-serif;
    width: 100%;
    background: var(--surface);
    color: var(--ink);
    transition: all var(--transition);
    outline: none;
  }
  input[type="text"]:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,111,247,0.1);
  }
  textarea { resize: vertical; line-height: 1.7; min-height: 200px; }

  /* ── BUTTONS ──────────────────────────────────────────────── */
  .btn {
    padding: 8px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    transition: all var(--transition);
    border: none;
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .btn-primary { background: var(--ink); color: var(--bg); }
  .btn-primary:hover:not(:disabled) { opacity: 0.82; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-accent { background: var(--accent); color: #fff; }
  .btn-accent:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-accent:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--ink-2); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--bg-2); border-color: var(--border-2); color: var(--ink); }
  .btn-danger { background: transparent; color: var(--red); border: 1px solid transparent; font-size: 12px; padding: 5px 9px; }
  .btn-danger:hover { background: var(--red-soft); border-color: var(--red); }
  .btn-sm { padding: 5px 11px; font-size: 12px; }
  .action-row { display: flex; gap: 7px; flex-wrap: wrap; margin-top: 0.9rem; }

  /* ── MISC ─────────────────────────────────────────────────── */
  .hint { font-size: 11.5px; color: var(--ink-3); margin-top: 5px; }
  .status { font-size: 12.5px; color: var(--ink-3); margin-top: 7px; min-height: 18px; }
  .status.err { color: var(--red); }
  .field { margin-bottom: 9px; }
  .field label { font-size: 10.5px; font-weight: 600; color: var(--ink-3); display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.06em; }
  .divider { height: 1px; background: var(--border); margin: 1rem 0; }
  .hidden { display: none !important; }

  /* ── PUB CARDS ────────────────────────────────────────────── */
  .pub-list { display: flex; flex-direction: column; gap: 8px; margin-top: 0.9rem; }
  .pub-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0.9rem 1rem;
    border-left: 3px solid var(--border-2);
    transition: all var(--transition);
  }
  .pub-card:hover { border-color: var(--accent); border-left-color: var(--accent); }
  .pub-card.selected { border-left-color: var(--green); border-color: var(--green); background: var(--green-soft); }
  .pub-card-title {
    font-family: 'Lora', Georgia, serif;
    font-size: 13px;
    font-weight: 500;
    line-height: 1.45;
    margin-bottom: 4px;
    color: var(--ink);
  }
  .pub-card-title a { color: inherit; text-decoration: none; border-bottom: 1px solid var(--border-2); transition: border-color var(--transition); }
  .pub-card-title a:hover { border-bottom-color: var(--accent); color: var(--accent); }
  .pub-card-meta { font-size: 11px; color: var(--ink-3); display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 3px; }
  .pub-card-authors { font-size: 11.5px; color: var(--ink-2); margin-bottom: 6px; line-height: 1.5; font-style: italic; }
  .pub-abstract-wrap { position: relative; }
  .pub-abstract {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.65;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
    transition: all 0.2s;
  }
  .pub-abstract.expanded { display: block; -webkit-line-clamp: unset; }
  .expand-btn {
    background: none; border: none; cursor: pointer;
    font-size: 11px; color: var(--accent); padding: 2px 0;
    font-family: 'Inter', sans-serif; margin-top: 3px;
  }
  .expand-btn:hover { text-decoration: underline; }
  .pub-card-footer { margin-top: 9px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 7px; }

  /* ── BADGES ───────────────────────────────────────────────── */
  .badge { display: inline-flex; align-items: center; font-size: 10px; font-weight: 600; padding: 2px 7px; border-radius: 100px; letter-spacing: 0.03em; text-transform: uppercase; }
  .badge-purple  { background: var(--accent-soft); color: var(--accent); }
  .badge-high    { background: var(--red-soft); color: var(--red); }
  .badge-medium  { background: var(--amber-soft); color: var(--amber); }
  .badge-low     { background: var(--green-soft); color: var(--green); }

  /* ── SUMMARY ──────────────────────────────────────────────── */
  .summary-box {
    background: var(--surface);
    border-radius: var(--radius-md);
    padding: 1rem 1.1rem;
    font-size: 13px;
    line-height: 1.8;
    color: var(--ink-2);
    border-left: 3px solid var(--accent);
    border: 1px solid var(--border);
    border-left-width: 3px;
  }
  .summary-box p { margin-bottom: 0.6rem; }
  .summary-box p:last-child { margin-bottom: 0; }

  /* ── TRACKER ──────────────────────────────────────────────── */
  .tracker-wrap { flex: 1; overflow-y: auto; padding: 1.25rem 1.5rem; }
  .tracker-wrap::-webkit-scrollbar { width: 4px; }
  .tracker-wrap::-webkit-scrollbar-thumb { background: var(--border-2); border-radius: 4px; }
  .tracker-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .tracker-title { font-family: 'Lora', Georgia, serif; font-size: 16px; font-weight: 500; }
  .tracker-count { font-size: 12px; color: var(--ink-3); margin-top: 2px; }
  .tracker-empty { text-align: center; padding: 4rem 1rem; color: var(--ink-3); font-size: 13px; line-height: 1.8; }
  .tracker-empty strong { display: block; font-size: 15px; color: var(--ink-2); margin-bottom: 6px; }
  .tracker-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-md);
    padding: 1rem 1.1rem;
    margin-bottom: 8px;
    display: grid;
    grid-template-columns: 1fr auto auto auto;
    gap: 0.75rem;
    align-items: start;
  }
  .tracker-card:hover { border-color: var(--border-2); }
  .t-prof { font-weight: 500; font-size: 13px; }
  .t-email { font-size: 11px; color: var(--ink-3); margin-top: 1px; }
  .t-paper { font-size: 11px; color: var(--accent); text-decoration: none; margin-top: 2px; display: inline-block; }
  .t-paper:hover { text-decoration: underline; }
  .t-meta { font-size: 11px; color: var(--ink-3); line-height: 1.8; }
  .t-meta span { display: block; }
  .followup-ok { color: var(--green); }
  .followup-soon { color: var(--amber); font-weight: 500; }
  .followup-overdue { color: var(--red); font-weight: 500; }
  .notes-input { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 5px 9px; font-size: 12px; width: 140px; background: var(--bg-2); color: var(--ink); font-family: 'Inter', sans-serif; }
  .notes-input:focus { outline: none; border-color: var(--accent); }

  /* ── SPINNER & TOAST ──────────────────────────────────────── */
  .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid currentColor; border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: -2px; margin-right: 5px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .toast { position: fixed; bottom: 1.25rem; right: 1.25rem; background: var(--ink); color: var(--bg); padding: 9px 15px; border-radius: var(--radius-md); font-size: 13px; font-weight: 500; opacity: 0; transform: translateY(6px); transition: all 0.2s ease; pointer-events: none; z-index: 999; max-width: 260px; }
  .toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="app-shell">

  <!-- TOPBAR -->
  <div class="topbar">
    <div class="logo">
      <div class="logo-icon">🔬</div>
      <div class="logo-text">ResearchReach</div>
    </div>
    <div class="topbar-center">
      <button class="tab-btn active" onclick="switchTab('search', event)">Search &amp; Email</button>
      <button class="tab-btn" onclick="switchTab('tracker', event)">Email Tracker</button>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" onclick="restartAll()" title="Start over">↺</button>
      <button class="icon-btn" onclick="toggleTheme()" id="themeBtn" title="Toggle dark mode">🌙</button>
    </div>
  </div>

  <!-- STEP RAIL -->
  <div class="step-rail" id="stepRail">
    <div class="step-pill active" id="pill-1">
      <span class="step-num">1</span>Find Publications
    </div>
    <span class="step-arrow">›</span>
    <div class="step-pill" id="pill-2">
      <span class="step-num">2</span>Research Summary
    </div>
    <span class="step-arrow">›</span>
    <div class="step-pill" id="pill-3">
      <span class="step-num">3</span>Compose Email
    </div>
  </div>

  <!-- CONTENT AREA -->
  <div class="content-area">

    <!-- SEARCH TAB -->
    <div class="tab-panel active" id="tab-search">
      <div class="steps-row">

        <!-- COL 1: Search -->
        <div class="step-col">
          <div class="step-col-header">
            <div class="step-col-title">
              <span class="step-num" style="background:var(--accent-soft);color:var(--accent);">1</span>
              Find Publications
            </div>
          </div>
          <div class="step-col-body">
            <div class="input-row" style="margin-bottom:4px;">
              <input type="text" id="profName" placeholder="e.g. Jennifer Doudna UC Berkeley" onkeydown="if(event.key==='Enter') searchPubs()" />
              <button class="btn btn-primary" id="searchBtn" onclick="searchPubs()">Search</button>
            </div>
            <div class="hint">Include university for best results</div>
            <div id="searchStatus" class="status"></div>
            <div class="pub-list" id="pubResults"></div>
          </div>
        </div>

        <!-- COL 2: Summary -->
        <div class="step-col">
          <div class="step-col-header">
            <div class="step-col-title">
              <span class="step-num" id="dot2">2</span>
              Research Summary
            </div>
          </div>
          <div class="step-col-body" id="col2Body">
            <div style="color:var(--ink-3); font-size:13px; padding-top:0.5rem;">
              Select a paper from the left to see a summary here.
            </div>
          </div>
        </div>

        <!-- COL 3: Email -->
        <div class="step-col">
          <div class="step-col-header">
            <div class="step-col-title">
              <span class="step-num" id="dot3">3</span>
              Compose Email
            </div>
          </div>
          <div class="step-col-body" id="col3Body">
            <div style="color:var(--ink-3); font-size:13px; padding-top:0.5rem;" id="col3Placeholder">
              Complete Step 2 to compose an email.
            </div>
            <div id="emailForm" class="hidden">
              <div class="field">
                <label>Your full name</label>
                <input type="text" id="senderName" placeholder="e.g. Alex Varela" />
              </div>
              <div class="field">
                <label>Your degree &amp; university</label>
                <input type="text" id="senderInfo" value="B.S. Biochemistry, California State University Fullerton" />
              </div>
              <div class="field">
                <label>Professor's email <span style="font-weight:400;text-transform:none;letter-spacing:0;">(optional)</span></label>
                <input type="text" id="profEmail" placeholder="professor@university.edu" />
              </div>
              <button class="btn btn-accent" onclick="generateEmail()" id="genEmailBtn">Generate email draft</button>
              <div id="emailStatus" class="status"></div>
              <div id="emailArea" class="hidden" style="margin-top:1rem;">
                <div class="divider"></div>
                <div class="field">
                  <label>Subject line</label>
                  <input type="text" id="emailSubject" />
                </div>
                <div class="field">
                  <label>Email body — edit before sending</label>
                  <textarea id="emailBody" style="min-height:260px;"></textarea>
                </div>
                <div class="action-row">
                  <button class="btn btn-primary btn-sm" onclick="openGmail()">Open in Gmail</button>
                  <button class="btn btn-ghost btn-sm" onclick="copyEmail()">Copy</button>
                  <button class="btn btn-ghost btn-sm" onclick="generateEmail()">Regenerate</button>
                  <button class="btn btn-ghost btn-sm" onclick="logToTracker()">Mark as sent</button>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>

    <!-- TRACKER TAB -->
    <div class="tab-panel" id="tab-tracker">
      <div class="tracker-wrap">
        <div class="tracker-header">
          <div>
            <div class="tracker-title">Outreach Log</div>
            <div class="tracker-count" id="trackerCount">No entries yet</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="clearAllTracked()">Clear all</button>
        </div>
        <div id="trackerBody"></div>
      </div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ─────────────────────────────────────────────────────
  //  PASTE YOUR CLOUDFLARE WORKER URL BELOW
  // ─────────────────────────────────────────────────────
  const WORKER_URL = "https://professor-emailer.avarela8058.workers.dev/";

  let selectedPub = null;
  let profNameValue = '';

  // ── THEME ─────────────────────────────────────────────
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('themeBtn').textContent = isDark ? '🌙' : '☀️';
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
  }
  (function initTheme() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    window.addEventListener('DOMContentLoaded', () => {
      document.getElementById('themeBtn').textContent = saved === 'dark' ? '☀️' : '🌙';
    });
  })();

  // ── RESTART ───────────────────────────────────────────
  function restartAll() {
    selectedPub = null;
    profNameValue = '';
    document.getElementById('profName').value = '';
    document.getElementById('searchStatus').innerHTML = '';
    document.getElementById('pubResults').innerHTML = '';
    document.getElementById('col2Body').innerHTML = '<div style="color:var(--ink-3);font-size:13px;padding-top:0.5rem;">Select a paper from the left to see a summary here.</div>';
    document.getElementById('col3Placeholder').classList.remove('hidden');
    document.getElementById('emailForm').classList.add('hidden');
    document.getElementById('emailArea').classList.add('hidden');
    document.getElementById('emailStatus').innerHTML = '';
    document.getElementById('senderName').value = '';
    document.getElementById('profEmail').value = '';
    document.getElementById('emailSubject').value = '';
    document.getElementById('emailBody').value = '';
    document.getElementById('genEmailBtn').innerHTML = 'Generate email draft';
    document.getElementById('searchBtn').disabled = false;
    setPills(1);
    showToast('Cleared — ready for a new search');
  }

  // ── STEP PILLS ────────────────────────────────────────
  function setPills(active) {
    for (let i = 1; i <= 3; i++) {
      const p = document.getElementById('pill-' + i);
      p.classList.remove('active', 'done');
      if (i < active) p.classList.add('done');
      else if (i === active) p.classList.add('active');
    }
  }

  // ── TABS ──────────────────────────────────────────────
  function switchTab(name, e) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.getElementById('tab-' + name).classList.add('active');
    if (e && e.target) e.target.classList.add('active');
    if (name === 'tracker') renderTracker();
  }

  // ── CLAUDE API ────────────────────────────────────────
  async function callClaude(userPrompt, system) {
    if (WORKER_URL === "PASTE_YOUR_WORKER_URL_HERE") throw new Error("Worker URL not set — replace PASTE_YOUR_WORKER_URL_HERE in index.html with your Cloudflare Worker URL.");
    const body = { model: 'claude-sonnet-4-6', max_tokens: 1000, messages: [{ role: 'user', content: userPrompt }] };
    if (system) body.system = system;
    const res = await fetch(WORKER_URL, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    if (!res.ok) { const err = await res.json().catch(() => ({})); throw new Error(err?.error?.message || 'API error ' + res.status); }
    const data = await res.json();
    return data.content?.find(b => b.type === 'text')?.text || '';
  }

  // ── PUBMED SEARCH ─────────────────────────────────────
  async function searchPubs() {
    const name = document.getElementById('profName').value.trim();
    if (!name) return;
    profNameValue = name;
    const status = document.getElementById('searchStatus');
    const results = document.getElementById('pubResults');
    const btn = document.getElementById('searchBtn');
    status.className = 'status';
    status.innerHTML = '<span class="spinner"></span> Searching PubMed...';
    results.innerHTML = '';
    btn.disabled = true;
    selectedPub = null;
    document.getElementById('col2Body').innerHTML = '<div style="color:var(--ink-3);font-size:13px;padding-top:0.5rem;">Select a paper from the left to see a summary here.</div>';
    document.getElementById('col3Placeholder').classList.remove('hidden');
    document.getElementById('emailForm').classList.add('hidden');
    setPills(1);
    try {
      const query = encodeURIComponent(name + '[Author]');
      const s1 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${query}&retmax=5&sort=date&retmode=json`);
      const d1 = await s1.json();
      let ids = d1.esearchresult?.idlist || [];
      if (!ids.length) {
        const s2 = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi?db=pubmed&term=${encodeURIComponent(name)}&retmax=5&sort=date&retmode=json`);
        const d2 = await s2.json();
        ids = d2.esearchresult?.idlist || [];
      }
      if (!ids.length) { status.className = 'status err'; status.innerHTML = `No results for "${name}". Try last name + initials or add their university.`; btn.disabled = false; return; }
      const fr = await fetch(`https://eutils.ncbi.nlm.nih.gov/entrez/eutils/efetch.fcgi?db=pubmed&id=${ids.slice(0,5).join(',')}&retmode=xml`);
      const xml = await fr.text();
      const parser = new DOMParser();
      const doc = parser.parseFromString(xml, 'text/xml');
      const articles = Array.from(doc.querySelectorAll('PubmedArticle'));
      if (!articles.length) { status.className = 'status err'; status.innerHTML = 'Could not parse results.'; btn.disabled = false; return; }
      const pubs = articles.map(art => {
        const authors = Array.from(art.querySelectorAll('Author')).map(a => `${a.querySelector('LastName')?.textContent || ''} ${a.querySelector('Initials')?.textContent || ''}`.trim()).filter(Boolean);
        const pmid = art.querySelector('PMID')?.textContent || '';
        return { pmid, title: art.querySelector('ArticleTitle')?.textContent || 'Untitled', journal: art.querySelector('Journal > Title')?.textContent || '', year: art.querySelector('PubDate > Year')?.textContent || art.querySelector('PubDate > MedlineDate')?.textContent?.slice(0,4) || '', authors, abstract: Array.from(art.querySelectorAll('AbstractText')).map(a => a.textContent).join(' ') || 'No abstract available.', pubmedUrl: pmid ? `https://pubmed.ncbi.nlm.nih.gov/${pmid}/` : '' };
      });
      window._pubs = pubs;
      status.innerHTML = `Found ${pubs.length} publication${pubs.length !== 1 ? 's' : ''} — select one to continue.`;
      pubs.forEach((pub, i) => {
        const card = document.createElement('div');
        card.className = 'pub-card';
        card.id = 'pub-' + i;
        const authorsDisplay = pub.authors.length ? pub.authors.slice(0,6).join(', ') + (pub.authors.length > 6 ? ', et al.' : '') : 'Authors unavailable';
        const titleHtml = pub.pubmedUrl ? `<a href="${pub.pubmedUrl}" target="_blank">${pub.title}</a>` : pub.title;
        const age = new Date().getFullYear() - (parseInt(pub.year) || 0);
        let pLabel = 'High Priority', pClass = 'badge-high';
        if (age >= 3) { pLabel = 'Low Priority'; pClass = 'badge-low'; }
        else if (age >= 1) { pLabel = 'Medium Priority'; pClass = 'badge-medium'; }
        const abstractId = 'abs-' + i;
        card.innerHTML = `
          <div class="pub-card-title">${titleHtml}</div>
          <div class="pub-card-meta">
            <span>${pub.journal}</span><span style="color:var(--border-2)">·</span><span>${pub.year}</span>
            ${pub.pmid ? `<span class="badge badge-purple">PMID ${pub.pmid}</span>` : ''}
            <span class="badge ${pClass}">${pLabel}</span>
          </div>
          <div class="pub-card-authors">${authorsDisplay}</div>
          <div class="pub-abstract-wrap">
            <div class="pub-abstract" id="${abstractId}">${pub.abstract}</div>
            <button class="expand-btn" onclick="toggleAbstract('${abstractId}', this)">Show more ↓</button>
          </div>
          <div class="pub-card-footer">
            ${pub.pubmedUrl ? `<a href="${pub.pubmedUrl}" target="_blank" style="font-size:11px;color:var(--accent);text-decoration:none;">View on PubMed ↗</a>` : '<span></span>'}
            <button class="btn btn-primary btn-sm" onclick="selectPub(${i})">Use this paper</button>
          </div>`;
        results.appendChild(card);
      });
    } catch(e) { status.className = 'status err'; status.innerHTML = 'PubMed error: ' + e.message; }
    btn.disabled = false;
  }

  function toggleAbstract(id, btn) {
    const el = document.getElementById(id);
    const expanded = el.classList.toggle('expanded');
    btn.textContent = expanded ? 'Show less ↑' : 'Show more ↓';
  }

  // ── SELECT + SUMMARIZE ────────────────────────────────
  async function selectPub(idx) {
    const pub = window._pubs[idx];
    document.querySelectorAll('.pub-card').forEach(c => c.classList.remove('selected'));
    document.getElementById('pub-' + idx).classList.add('selected');
    selectedPub = pub;
    setPills(2);
    const col2 = document.getElementById('col2Body');
    col2.innerHTML = '<div style="padding-top:0.5rem;color:var(--ink-3);font-size:13px;"><span class="spinner"></span> Summarizing with Claude AI…</div>';
    document.getElementById('col3Placeholder').classList.remove('hidden');
    document.getElementById('emailForm').classList.add('hidden');
    try {
      const text = await callClaude(
        `Summarize this research paper for a biochemistry undergraduate seeking a volunteer position in this professor's lab.\n\nTitle: ${pub.title}\nJournal: ${pub.journal} (${pub.year})\nAuthors: ${pub.authors.join(', ')}\nAbstract: ${pub.abstract}\n\nWrite 3 focused paragraphs (~60 words each):\n1. What the research is about and why it matters\n2. Key methods and main findings\n3. What skills a volunteer biochemistry student could gain\n\nTone: enthusiastic but grounded. Plain language, no bullet points.`,
        'You are a science communicator helping undergraduates understand research.'
      );
      const authorsDisplay = pub.authors.length ? pub.authors.slice(0,6).join(', ') + (pub.authors.length > 6 ? ', et al.' : '') : 'Authors unavailable';
      const titleHtml = pub.pubmedUrl ? `<a href="${pub.pubmedUrl}" target="_blank" style="color:var(--accent);text-decoration:none;border-bottom:1px solid var(--accent);">${pub.title}</a>` : pub.title;
      col2.innerHTML = `
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:0.9rem 1rem;margin-bottom:1rem;">
          <div style="font-family:'Lora',Georgia,serif;font-size:13px;font-weight:500;line-height:1.45;margin-bottom:5px;">${titleHtml}</div>
          <div style="font-size:11px;color:var(--ink-3);margin-bottom:3px;">${pub.journal} · ${pub.year}</div>
          <div style="font-size:11.5px;color:var(--ink-2);font-style:italic;">${authorsDisplay}</div>
        </div>
        <div class="summary-box">${text.trim().split(/\n\n+/).filter(Boolean).map(p => `<p>${p.trim()}</p>`).join('')}</div>`;
      document.getElementById('col3Placeholder').classList.add('hidden');
      document.getElementById('emailForm').classList.remove('hidden');
      setPills(3);
    } catch(e) {
      col2.innerHTML = `<div style="color:var(--red);font-size:13px;padding-top:0.5rem;">Error: ${e.message}</div>`;
    }
  }

  // ── GENERATE EMAIL ────────────────────────────────────
  async function generateEmail() {
    if (!selectedPub) return;
    const sender = document.getElementById('senderName').value.trim() || '[Your Name]';
    const senderInfo = document.getElementById('senderInfo').value.trim();
    const btn = document.getElementById('genEmailBtn');
    const status = document.getElementById('emailStatus');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Drafting…';
    status.innerHTML = '';
    try {
      const text = await callClaude(
        `Write a cold email from ${sender} (${senderInfo}) to Professor ${profNameValue} asking if they have room for an unpaid volunteer in their lab.\n\nPaper: "${selectedPub.title}" — ${selectedPub.journal} (${selectedPub.year})\nAbstract: ${selectedPub.abstract}\n\nFormat:\nSubject: [subject line]\n\n[body]\n\nGuidelines:\n- Open with one specific compelling detail from this paper\n- Show genuine curiosity about this research direction\n- Mention biochemistry background at CSUF\n- Clearly state this is an unpaid volunteer request\n- 3-4 short paragraphs, warm but professional\n- Close with a request for a 15-minute call\n- Sign off as: ${sender}\n- No placeholder brackets anywhere`,
        'You write cold emails that sound like a real enthusiastic college student wrote them — not a professional copywriter or AI. Use natural sentence rhythm with occasional short sentences. Vary paragraph length. Avoid corporate phrases like "I am writing to express my interest", "I would be honored", "keen interest", "leverage my skills", "align with my goals", or "I am reaching out". Never use em-dashes. Do not open with the student\'s name or "My name is". Write the way a smart, excited undergrad actually talks — genuine curiosity, a little informal but still respectful, no buzzwords.'
      );
      const lines = text.split('\n');
      const subjIdx = lines.findIndex(l => l.toLowerCase().startsWith('subject:'));
      const subject = subjIdx >= 0 ? lines[subjIdx].replace(/^subject:\s*/i, '').trim() : `Volunteer Research Inquiry — ${profNameValue} Lab`;
      const body = lines.slice(subjIdx + 1).join('\n').replace(/^\n+/, '');
      document.getElementById('emailSubject').value = subject;
      document.getElementById('emailBody').value = body;
      document.getElementById('emailArea').classList.remove('hidden');
      btn.innerHTML = 'Regenerate draft';
    } catch(e) {
      status.className = 'status err';
      status.innerHTML = 'Error: ' + e.message;
      btn.innerHTML = 'Generate email draft';
    }
    btn.disabled = false;
  }

  function openGmail() {
    const to = encodeURIComponent(document.getElementById('profEmail').value.trim());
    const subject = encodeURIComponent(document.getElementById('emailSubject').value);
    const body = encodeURIComponent(document.getElementById('emailBody').value);
    window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${to}&su=${subject}&body=${body}`, '_blank');
  }
  function copyEmail() {
    const full = `Subject: ${document.getElementById('emailSubject').value}\n\n${document.getElementById('emailBody').value}`;
    navigator.clipboard.writeText(full).then(() => showToast('Email copied to clipboard'));
  }

  // ── TRACKER ───────────────────────────────────────────
  function getTracked() { try { return JSON.parse(localStorage.getItem('prof_tracker') || '[]'); } catch { return []; } }
  function saveTracked(d) { localStorage.setItem('prof_tracker', JSON.stringify(d)); }

  function logToTracker() {
    if (!selectedPub || !profNameValue) return;
    const today = new Date();
    const followUp = new Date(today);
    followUp.setDate(followUp.getDate() + 14);
    const age = new Date().getFullYear() - (parseInt(selectedPub.year) || 0);
    let priority = age >= 3 ? 'Low' : age >= 1 ? 'Medium' : 'High';
    const tracked = getTracked();
    if (tracked.find(t => t.professor.toLowerCase() === profNameValue.toLowerCase())) { showToast('Already in tracker'); return; }
    tracked.unshift({ id: Date.now(), professor: profNameValue, email: document.getElementById('profEmail').value.trim(), paper: selectedPub.title, paperUrl: selectedPub.pubmedUrl || '', dateSent: today.toISOString().split('T')[0], followUpDate: followUp.toISOString().split('T')[0], priority, notes: '' });
    saveTracked(tracked);
    showToast('Added to outreach log');
  }

  function renderTracker() {
    const tracked = getTracked();
    const body = document.getElementById('trackerBody');
    document.getElementById('trackerCount').textContent = tracked.length ? `${tracked.length} professor${tracked.length !== 1 ? 's' : ''} tracked` : 'No entries yet';
    if (!tracked.length) { body.innerHTML = `<div class="tracker-empty"><strong>Your outreach log is empty</strong>Search a professor, generate an email, then click "Mark as sent".</div>`; return; }
    const today = new Date().toISOString().split('T')[0];
    body.innerHTML = tracked.map(t => {
      const pc = t.priority === 'High' ? 'badge-high' : t.priority === 'Medium' ? 'badge-medium' : 'badge-low';
      const days = Math.ceil((new Date(t.followUpDate) - new Date(today)) / 86400000);
      let fClass = 'followup-ok', fLabel = t.followUpDate;
      if (days < 0) { fClass = 'followup-overdue'; fLabel = `⚠ Overdue`; }
      else if (days <= 3) { fClass = 'followup-soon'; fLabel = `Due soon`; }
      return `<div class="tracker-card">
        <div>
          <div class="t-prof">${t.professor}</div>
          ${t.email ? `<div class="t-email">${t.email}</div>` : ''}
          ${t.paperUrl ? `<a href="${t.paperUrl}" target="_blank" class="t-paper">View paper ↗</a>` : ''}
        </div>
        <div class="t-meta">
          <span><span class="badge ${pc}">${t.priority}</span></span>
          <span style="margin-top:4px;">Sent: ${t.dateSent}</span>
          <span class="${fClass}">Follow-up: ${fLabel}</span>
        </div>
        <input class="notes-input" placeholder="Notes…" value="${t.notes || ''}" onchange="updateNotes(${t.id}, this.value)" />
        <button class="btn btn-danger" onclick="removeTracked(${t.id})">Remove</button>
      </div>`;
    }).join('');
  }

  function updateNotes(id, value) { const t = getTracked(); const e = t.find(x => x.id === id); if (e) { e.notes = value; saveTracked(t); } }
  function removeTracked(id) { saveTracked(getTracked().filter(t => t.id !== id)); renderTracker(); }
  function clearAllTracked() { if (confirm('Clear all tracked professors?')) { saveTracked([]); renderTracker(); } }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }
</script>
</body>
</html>
